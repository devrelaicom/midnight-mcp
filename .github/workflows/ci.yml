name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ["24.14.0", "25.8.1"]

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Check for unresolved infrastructure placeholders
        run: |
          if grep -q 'REPLACE_AFTER_CREATE' api/wrangler.toml; then
            echo "::error file=api/wrangler.toml::Unresolved D1 database placeholder. Run: npx wrangler d1 create midnight-mcp — then update database_id. See api/README.md Step 4."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint (warnings are errors)
        run: npx eslint src/ --max-warnings 0

      - name: Format check
        run: npx prettier --check "src/**/*.ts"

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test -- --run

      - name: Install API dependencies
        working-directory: api
        run: npm ci

      - name: Typecheck API
        working-directory: api
        run: npx tsc --noEmit

  publish-check:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25.8.1
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check package
        run: npm pack --dry-run
