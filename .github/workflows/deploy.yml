name: Deploy Worker

on:
  push:
    branches: [main]
    paths:
      - "api/**"
  workflow_dispatch:

concurrency:
  group: worker-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: CLOUDFLARE
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25.8.1
          cache: "npm"
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        working-directory: api
        run: npm ci

      - name: Generate wrangler.toml from example
        working-directory: api
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          cp wrangler.toml.example wrangler.toml

          D1_ID="$(npx wrangler d1 list --json | jq -r '.[] | select(.name=="midnight-mcp") | .uuid')"
          KV_ID="$(npx wrangler kv namespace list --json | jq -r '.[] | select(.title=="midnight-mcp-metrics") | .id')"

          if [ -z "$D1_ID" ]; then
            echo "::error::D1 database 'midnight-mcp' not found. Create it with: npx wrangler d1 create midnight-mcp"
            exit 1
          fi
          if [ -z "$KV_ID" ]; then
            echo "::error::KV namespace 'midnight-mcp-metrics' not found. Create it via the Cloudflare dashboard."
            exit 1
          fi

          sed -i "s|__D1_DATABASE_ID__|$D1_ID|" wrangler.toml
          sed -i "s|__KV_NAMESPACE_ID__|$KV_ID|" wrangler.toml

          if grep -q '__D1_DATABASE_ID__\|__KV_NAMESPACE_ID__' wrangler.toml; then
            echo "::error::Unresolved placeholder tokens remain in wrangler.toml"
            exit 1
          fi

      - name: Typecheck
        working-directory: api
        run: npx tsc --noEmit

      - name: Run API tests
        working-directory: api
        run: npx vitest run

      - name: Deploy to Cloudflare Workers
        working-directory: api
        run: npx wrangler deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
